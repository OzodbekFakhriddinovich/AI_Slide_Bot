<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulashish</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621;
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .share-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .share-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* 🟢 PDF - YASHIL */
        .btn-pdf {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        /* 🟡 ZIP - SARIQ */
        .btn-zip {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            color: #1a1a1a;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3);
        }

        /* 🔵 REFERRAL - KO'K */
        .btn-referral {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <button class="share-btn btn-pdf" id="pdfBtn" onclick="share()">
        <span class="icon">📄</span>
        <span id="btnText">Ulashish</span>
    </button>

    <button class="share-btn btn-zip" id="zipBtn" onclick="share()" style="display:none;">
        <span class="icon">📦</span>
        <span id="zipBtnText">Ulashish</span>
    </button>

    <button class="share-btn btn-referral" id="refBtn" onclick="share()" style="display:none;">
        <span class="icon">👥</span>
        <span id="refBtnText">Do'stlarga ulashish</span>
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const lang = urlParams.get('lang') || 'UZ';
        const shareUrl = urlParams.get('url') || '';

        const texts = {
            UZ: {
                pdf: 'Ulashish',
                zip: 'Ulashish',
                ref: "Do'stlarga ulashish"
            },
            RU: {
                pdf: 'Поделиться',
                zip: 'Поделиться',
                ref: 'Отправить друзьям'
            },
            ENG: {
                pdf: 'Share',
                zip: 'Share',
                ref: 'Share with friends'
            }
        };

        // Tugmalarni ko'rsatish/yashirish va matnlarni o'rnatish
        if (type === 'pdf') {
            document.getElementById('pdfBtn').style.display = 'flex';
            document.getElementById('btnText').textContent = texts[lang]?.pdf || texts.UZ.pdf;
        } else if (type === 'zip') {
            document.getElementById('zipBtn').style.display = 'flex';
            document.getElementById('zipBtnText').textContent = texts[lang]?.zip || texts.UZ.zip;
        } else if (type === 'referral') {
            document.getElementById('refBtn').style.display = 'flex';
            document.getElementById('refBtnText').textContent = texts[lang]?.ref || texts.UZ.ref;
        }

        function share() {
            if (shareUrl) {
                tg.openTelegramLink(decodeURIComponent(shareUrl));
            }
        }
    </script>
</body>
</html>
