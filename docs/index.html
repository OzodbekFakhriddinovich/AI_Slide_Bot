<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Taqdimot | Slayd | PPT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1621; color: #e8e8e8;
            padding: 20px 16px 30px;
        }
        h1 { font-size: 21px; font-weight: 700; color: #ffffff; margin-bottom: 22px; }
        
        .field-group { margin-bottom: 18px; }
        input[type="text"], .custom-select {
            width: 100%; padding: 12px 14px; background: #1c2733;
            border: 1.5px solid #2a3a4a; border-radius: 10px;
            color: #ffffff; font-size: 15px; outline: none;
        }
        input:focus, .custom-select:focus { border-color: #3a7bd5; }
        .error-field { border-color: #e06060 !important; }
        .field-hint { font-size: 12px; color: #4a8fd4; margin-top: 6px; }

        /* --- GORIZONTAL SHABLONLAR --- */
        .template-wrapper {
            position: relative;
            margin: 15px -16px; /* Ekran chetiga taqalishi uchun */
        }
        .template-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 10px 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        /* Skrollbarni yashirish (ixtiyoriy) */
        .template-scroll::-webkit-scrollbar { display: none; }

        .tpl-card {
            flex: 0 0 160px; /* Har bir kartaning kengligi */
            scroll-snap-align: start;
            background: #1c2733; border: 2px solid transparent;
            border-radius: 12px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .tpl-card.selected { border-color: #3a7bd5; transform: scale(1.02); }
        .tpl-card.error-tpl { border-color: #e06060; }

        .tpl-preview { width: 100%; height: 100px; }
        .tpl-label { font-size: 11px; text-align: center; padding: 8px 4px; color: #8a9aaa; }

        /* Rangli gradientlar */
        .tpl-1 { background: linear-gradient(145deg, #c9a882, #5c4a30); }
        .tpl-2 { background: linear-gradient(145deg, #d4c4a8, #8b7a5a); }
        .tpl-3 { background: linear-gradient(145deg, #e8d5c0, #a07850); }
        .tpl-4 { background: linear-gradient(145deg, #2d4a2d, #6aaa6a); }
        .tpl-5 { background: linear-gradient(145deg, #3a2d5a, #7a6aaa); }
        .tpl-6 { background: linear-gradient(145deg, #1a3a5a, #3a7aba); }
        .tpl-7 { background: linear-gradient(145deg, #0a1a3a, #2a3a9a); }
        .tpl-8 { background: linear-gradient(145deg, #f0f4f8, #b0c8dc); }
        .tpl-9 { background: linear-gradient(145deg, #1a2a1a, #3a6a3a); }
        .tpl-10 { background: linear-gradient(145deg, #e8eef4, #a8c0d4); }

        /* Tarif va Formatlar */
        .tariff-card, .format-card {
            background: #1c2733; border: 2px solid #2a3a4a;
            border-radius: 12px; padding: 14px; margin-bottom: 10px;
            cursor: pointer; display: flex; align-items: center; gap: 12px;
        }
        .selected { border-color: #3a7bd5 !important; }
        .radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #4a5a6a; display: flex; align-items: center; justify-content: center; }
        .selected .radio { background: #3a7bd5; border-color: #3a7bd5; }
        .radio-dot { width: 6px; height: 6px; background: white; border-radius: 50%; }

        .submit-btn {
            width: 100%; padding: 16px; background: #3a7bd5; border: none;
            border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700;
            margin-top: 20px; cursor: pointer;
        }
        .global-err { color: #e06060; font-size: 13px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <h1>AI Taqdimot yaratish</h1>

    <div id="globalErr" class="global-err"></div>

    <div class="field-group">
        <input type="text" id="topic" placeholder="Prezentatsiya mavzusi (masalan: Global isish)">
        <div class="field-hint">Mavzuni to'liq kiritish sifatni oshiradi.</div>
    </div>

    <div class="field-group">
        <input type="text" id="name" placeholder="Ism Familiya">
    </div>

    <div class="field-group">
        <select class="custom-select" id="language">
            <option value="UZ" selected>O'zbekcha</option>
            <option value="RU">Ruscha</option>
            <option value="ENG">Inglizcha</option>
        </select>
    </div>

    <div class="section-title" style="margin-top: 20px;">Shablonni tanlang (Yon tomonga suring)</div>
    <div class="template-wrapper">
        <div class="template-scroll" id="templateGrid">
            <!-- JS orqali to'ldiriladi -->
        </div>
    </div>

    <div class="section-title">Tariflar</div>
    <div class="tariff-card selected" onclick="selectTariff('3000', this)">
        <div class="radio"><div class="radio-dot"></div></div>
        <div><b>Standart</b> - 3000 so'm</div>
    </div>
    <div class="tariff-card" onclick="selectTariff('7000', this)">
        <div class="radio"><div class="radio-dot"></div></div>
        <div><b>Premium AI</b> - 7000 so'm</div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">✅ Taqdimot yaratish</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. AVTO ISM: Telegram ismini inputga qo'yish
    const user = tg.initDataUnsafe?.user;
    if (user) {
        const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ');
        document.getElementById('name').value = fullName;
    }

    let selectedTemplate = 1; // Default tanlangan
    let selectedTariff = "3000";

    // 2. SHABLONLARNI GORIZONTAL GENERATSIYA QILISH
    const templates = [
        { id: 1, name: "Brown History 3", cls: "tpl-1" },
        { id: 2, name: "Brown History 2", cls: "tpl-2" },
        { id: 3, name: "Flowers 3", cls: "tpl-3" },
        { id: 4, name: "Green World", cls: "tpl-4" },
        { id: 5, name: "Biome", cls: "tpl-5" },
        { id: 6, name: "Green Abstract", cls: "tpl-6" },
        { id: 7, name: "Deep Blue", cls: "tpl-7" },
        { id: 8, name: "Minimalist", cls: "tpl-8" },
        { id: 9, name: "Dark Nature", cls: "tpl-9" },
        { id: 10, name: "Snow White", cls: "tpl-10" }
    ];

    const grid = document.getElementById('templateGrid');
    templates.forEach(t => {
        const card = document.createElement('div');
        card.className = `tpl-card ${t.id === 1 ? 'selected' : ''}`;
        card.id = `tpl-${t.id}`;
        card.onclick = () => {
            document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedTemplate = t.id;
        };
        card.innerHTML = `
            <div class="tpl-preview ${t.cls}"></div>
            <div class="tpl-label">${t.name}</div>
        `;
        grid.appendChild(card);
    });

    function selectTariff(val, el) {
        document.querySelectorAll('.tariff-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedTariff = val;
    }

    function submitForm() {
        const topic = document.getElementById('topic').value.trim();
        const name = document.getElementById('name').value.trim();
        const lang = document.getElementById('language').value;

        if (!topic) {
            document.getElementById('topic').classList.add('error-field');
            tg.HapticFeedback.notificationOccurred('error');
            return;
        }

        const data = {
            topic: topic,
            name: name || "Foydalanuvchi",
            language: lang,
            template: String(selectedTemplate),
            tariff: selectedTariff
        };

        tg.sendData(JSON.stringify(data));
    }
</script>
</body>
</html>
